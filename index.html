<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy 3D Desk Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div class="background-overlay" id="bgOverlay"></div>

    <canvas id="pet-3d-canvas"></canvas>

    <div class="pet-bubble" id="petBubble">Miau! ✨</div>

    <main class="desktop" id="desktop">
        
        <div class="widget glass-widget" id="widget-clock" style="top: 15%; left: 10%;">
            <div class="widget-header">
                <span class="widget-title">Time</span>
                <button class="close-btn" onclick="minimizeWidget('widget-clock')">×</button>
            </div>
            <div class="widget-content clock-content">
                <h1 id="clock-time">00:00</h1>
                <p id="clock-date">Montag, 1. Januar</p>
            </div>
        </div>

        <div class="widget glass-widget" id="widget-spotify" style="top: 15%; left: 55%;">
            <div class="widget-header">
                <span class="widget-title">Spotify Player</span>
                <button class="close-btn" onclick="minimizeWidget('widget-spotify')">×</button>
            </div>
            <div class="widget-content spotify-content">
                <div id="spotify-player-container">
                    <iframe id="spotify-iframe" src="about:blank" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                </div>
                <div class="spotify-input-group">
                    <input type="text" id="spotify-link-input" placeholder="Spotify Link einfügen...">
                    <button onclick="updateSpotifyLink()">Laden</button>
                </div>
            </div>
        </div>

        <div class="widget glass-widget" id="widget-notes" style="top: 50%; left: 30%;">
            <div class="widget-header">
                <span class="widget-title">Notes</span>
                <button class="close-btn" onclick="minimizeWidget('widget-notes')">×</button>
            </div>
            <div class="widget-content">
                <textarea id="notes-textarea" placeholder="Schreib was auf..."></textarea>
            </div>
        </div>

    </main>

    <footer class="dock">
        <button class="dock-btn" onclick="restoreWidget('widget-clock')">🕒 Uhr</button>
        <button class="dock-btn" onclick="restoreWidget('widget-spotify')">🎵 Musik</button>
        <button class="dock-btn" onclick="restoreWidget('widget-notes')">📝 Notizen</button>
        <div class="dock-divider"></div>
        <label class="dock-btn upload-btn">
            🖼️ Background
            <input type="file" id="bg-upload" accept="image/*" style="display: none;">
        </label>
    </footer>
<script src="assets/pets/cat/cat.js"></script>
    <script src="app.js"></script>
</body>
</html>
